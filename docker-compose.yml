services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://solar_user:Z7nmNDVHzTdhaUU9U9Li4w3U@db:5432/solarlisting}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@findsolarinstallers.xyz}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      - DEBUG=${DEBUG:-false}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-info@findsolarinstallers.xyz}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Find Solar Installers}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://solar_user:Z7nmNDVHzTdhaUU9U9Li4w3U@db:5432/solarlisting}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-changeme}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://solar_user:Z7nmNDVHzTdhaUU9U9Li4w3U@db:5432/solarlisting}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - SECRET_KEY=${SECRET_KEY:-changeme}
    depends_on:
      - redis
    restart: unless-stopped

  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${DB_USER:-solar_user}
      POSTGRES_PASSWORD: ${DB_PASS:-Z7nmNDVHzTdhaUU9U9Li4w3U}
      POSTGRES_DB: ${DB_NAME:-solarlisting}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-solar_user} -d ${DB_NAME:-solarlisting}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
